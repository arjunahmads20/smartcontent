name: smartcontent_mobile
description: "A new Flutter project for SmartContent."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_lucide: 1.11.0
  carousel_slider: ^4.2.1
  percent_indicator: ^4.2.3
  fl_chart: ^0.66.0
  glassmorphism: ^3.0.0

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0

  # Networking & Auth
  dio: ^5.4.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Media
  cached_network_image: ^3.3.1
  youtube_player_flutter: ^8.1.2

  change_app_package_name: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  change_app_package_name: ^1.4.0

flutter:
  uses-material-design: true
